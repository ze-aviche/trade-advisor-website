<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Trading Advisor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-gray-900 via-blue-900 to-gray-900 min-h-screen">
    <div id="app" class="min-h-screen flex items-center justify-center">
        <div class="max-w-md w-full space-y-8 p-8">
            <!-- Logo and Title -->
            <div class="text-center">
                <div class="mx-auto h-16 w-16 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center mb-4">
                    <i class="fas fa-chart-line text-white text-2xl"></i>
                </div>
                <h2 class="text-3xl font-bold text-white mb-2">Trading Advisor</h2>
                <p class="text-gray-400">Sign in to access your dashboard</p>
            </div>

            <!-- Login Form -->
            <div v-if="!showRegister" class="bg-white bg-opacity-10 backdrop-blur-lg rounded-lg p-8 border border-white border-opacity-20">
                <form @submit.prevent="login" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                        <input 
                            v-model="loginForm.username" 
                            type="text" 
                            required
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="Enter your username">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                        <input 
                            v-model="loginForm.password" 
                            type="password" 
                            required
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="Enter your password">
                    </div>
                    
                    <div v-if="error" class="bg-red-500 bg-opacity-20 border border-red-500 rounded-lg p-3">
                        <p class="text-red-300 text-sm">{{ error }}</p>
                    </div>
                    
                    <button 
                        type="submit" 
                        :disabled="loading"
                        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i v-if="loading" class="fas fa-spinner fa-spin mr-2"></i>
                        <i v-else class="fas fa-sign-in-alt mr-2"></i>
                        {{ loading ? 'Signing in...' : 'Sign In' }}
                    </button>
                </form>
                
                <div class="mt-6 text-center">
                    <p class="text-gray-400 text-sm">
                        Don't have an account? 
                        <button @click="showRegister = true" class="text-blue-400 hover:text-blue-300 font-medium">
                            Register here
                        </button>
                    </p>
                </div>
            </div>

            <!-- Register Form -->
            <div v-if="showRegister" class="bg-white bg-opacity-10 backdrop-blur-lg rounded-lg p-8 border border-white border-opacity-20">
                <form @submit.prevent="register" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                        <input 
                            v-model="registerForm.username" 
                            type="text" 
                            required
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="Choose a username">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                        <input 
                            v-model="registerForm.email" 
                            type="email" 
                            required
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="Enter your email">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                        <input 
                            v-model="registerForm.password" 
                            type="password" 
                            required
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="Choose a password">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Confirm Password</label>
                        <input 
                            v-model="registerForm.confirmPassword" 
                            type="password" 
                            required
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="Confirm your password">
                    </div>
                    
                    <div v-if="error" class="bg-red-500 bg-opacity-20 border border-red-500 rounded-lg p-3">
                        <p class="text-red-300 text-sm">{{ error }}</p>
                    </div>
                    
                    <div v-if="success" class="bg-green-500 bg-opacity-20 border border-green-500 rounded-lg p-3">
                        <p class="text-green-300 text-sm">{{ success }}</p>
                    </div>
                    
                    <button 
                        type="submit" 
                        :disabled="loading"
                        class="w-full bg-gradient-to-r from-green-600 to-blue-600 hover:from-green-700 hover:to-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i v-if="loading" class="fas fa-spinner fa-spin mr-2"></i>
                        <i v-else class="fas fa-user-plus mr-2"></i>
                        {{ loading ? 'Creating account...' : 'Create Account' }}
                    </button>
                </form>
                
                <div class="mt-6 text-center">
                    <p class="text-gray-400 text-sm">
                        Already have an account? 
                        <button @click="showRegister = false" class="text-blue-400 hover:text-blue-300 font-medium">
                            Sign in here
                        </button>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    showRegister: false,
                    loading: false,
                    error: '',
                    success: '',
                    loginForm: {
                        username: '',
                        password: ''
                    },
                    registerForm: {
                        username: '',
                        email: '',
                        password: '',
                        confirmPassword: ''
                    }
                }
            },
            methods: {
                async login() {
                    this.loading = true;
                    this.error = '';
                    
                    try {
                        const response = await fetch('http://localhost:5000/api/auth/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                username: this.loginForm.username,
                                password: this.loginForm.password
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            // Store session token
                            localStorage.setItem('session_token', data.data.session_token);
                            localStorage.setItem('user', JSON.stringify(data.data.user));
                            
                            // Redirect to dashboard
                            window.location.href = '/';
                        } else {
                            this.error = data.error || 'Login failed';
                        }
                    } catch (error) {
                        this.error = 'Network error. Please try again.';
                        console.error('Login error:', error);
                    } finally {
                        this.loading = false;
                    }
                },
                
                async register() {
                    this.loading = true;
                    this.error = '';
                    this.success = '';
                    
                    // Validate passwords match
                    if (this.registerForm.password !== this.registerForm.confirmPassword) {
                        this.error = 'Passwords do not match';
                        this.loading = false;
                        return;
                    }
                    
                    // Validate password length
                    if (this.registerForm.password.length < 6) {
                        this.error = 'Password must be at least 6 characters';
                        this.loading = false;
                        return;
                    }
                    
                    try {
                        const response = await fetch('http://localhost:5000/api/auth/register', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                username: this.registerForm.username,
                                email: this.registerForm.email,
                                password: this.registerForm.password
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            this.success = 'Account created successfully! You can now sign in.';
                            this.registerForm = {
                                username: '',
                                email: '',
                                password: '',
                                confirmPassword: ''
                            };
                            
                            // Switch to login form after 2 seconds
                            setTimeout(() => {
                                this.showRegister = false;
                                this.success = '';
                            }, 2000);
                        } else {
                            this.error = data.error || 'Registration failed';
                        }
                    } catch (error) {
                        this.error = 'Network error. Please try again.';
                        console.error('Registration error:', error);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
