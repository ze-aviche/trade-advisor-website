<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Trading Advisor</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
    <div id="app">
        <div class="p-8">
            <h1 class="text-2xl font-bold mb-4">Debug Test</h1>
            <p>Active Tab: {{ activeTab }}</p>
            <button @click="switchTab('test')" class="bg-blue-600 px-4 py-2 rounded">
                Test Switch Tab
            </button>
            <button @click="switchTab('gap-ups')" class="bg-green-600 px-4 py-2 rounded ml-2">
                Switch to Gap-Ups
            </button>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    activeTab: 'dashboard'
                }
            },
            methods: {
                switchTab(tabName) {
                    console.log('Switching to tab:', tabName);
                    this.activeTab = tabName;
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
