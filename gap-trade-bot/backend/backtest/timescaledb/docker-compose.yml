version: "3.8"
services:
  timescaledb:
    image: timescale/timescaledb:2.17.0-pg15
    container_name: timescaledb
    environment:
      POSTGRES_USER: ts_user
      POSTGRES_PASSWORD: ts_pass
      POSTGRES_DB: marketdata
    ports:
      - "5432:5432"
    volumes:
      - tsdata:/var/lib/postgresql/data
    command: postgres -c max_locks_per_transaction=512 -c max_parallel_workers_per_gather=0
volumes:
  tsdata:
