version: "3.8"
services:
  timescaledb:
    image: timescale/timescaledb:2.17.0-pg15  # pick a recent Timescale image
    container_name: timescaledb
    environment:
      POSTGRES_USER: ts_user
      POSTGRES_PASSWORD: ts_pass
      POSTGRES_DB: marketdata
    ports:
      - "5432:5432"
    volumes:
      - tsdata:/var/lib/postgresql/data
volumes:
  tsdata:
